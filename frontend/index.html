          const wiki = await post(`/shows/${tmdbId}/wikis`, { label, url, season_url_template: tmpl });
          const pill = document.createElement('span');
          pill.className = 'wiki-pill';
          pill.innerHTML = `<a class="ext-link" href="${esc(wiki.url)}" target="_blank" rel="noopener">↗ ${esc(wiki.label)}</a><button class="wiki-del" data-wiki-id="${wiki.id}" title="Remove">×</button>`;
          pill.querySelector('.wiki-del').addEventListener('click', async () => {
            try { await del(`/shows/${tmdbId}/wikis/${wiki.id}`); pill.remove(); }
            catch(e) { alert('Error: ' + e.message); }
          });
          app.querySelector('#wiki-pills').appendChild(pill);
          wikiForm.style.display = 'none';
          app.querySelector('#wiki-label').value = '';
          app.querySelector('#wiki-url').value = '';
          app.querySelector('#wiki-season-tmpl').value = '';
        } catch(e) { alert('Error: ' + e.message); }
      });

      // Add banner
      if (!detail.tracked) {
        let selStatus = 'airing';
        app.querySelectorAll('.add-status-opt').forEach(o => {
          o.addEventListener('click', () => {
            selStatus = o.dataset.status;
            app.querySelectorAll('.add-status-opt').forEach(x => x.classList.toggle('selected', x===o));
          });
        });
        app.querySelector('#add-btn')?.addEventListener('click', async () => {
          try {
            await post('/shows/add', { tmdb_id: tmdbId, user_status: selStatus });
            navigate(`/show/${tmdbId}`);
          } catch(e) { alert('Error: ' + e.message); }
        });
      }

      // Load watch providers (non-blocking)
      loadProviders(app, tmdbId, '#watch-providers', false);
    }

    // ── Page: Season ─────────────────────────────────────────────────────────
    async function pageSeason(app, tmdbId, seasonNum) {
      let data, detailData;
      try {
        [data, detailData] = await Promise.all([
          get(`/shows/${tmdbId}/season/${seasonNum}`),
          get(`/shows/${tmdbId}/detail`),
        ]);
      } catch(e) {
        app.innerHTML = `<div class="page"><div class="empty-state"><h3>Error</h3><p>${esc(e.message)}</p></div></div>`;
        return;
      }

      // Local mutable state so we can update rows without full re-fetch
      const epState = {};
      data.episodes.forEach(ep => { epState[ep.episode_number] = { watched: ep.watched, watched_at: ep.watched_at, watch_count: ep.watch_count || 0, title: ep.title }; });

      const watched = data.episodes.filter(e => e.watched).length;
      const total = data.episodes.length;

      function epRowHTML(ep) {
        const st = epState[ep.episode_number];
        const codeLine = ep.air_date
          ? `${epCode(seasonNum, ep.episode_number)} · ${ep.air_date}`
          : epCode(seasonNum, ep.episode_number);
        return `
          <div class="episode-row${st.watched?' ep-row-watched':''}" data-ep="${ep.episode_number}">
            <div class="ep-check ${st.watched?'watched':''}" data-check="${ep.episode_number}">${st.watched?'✓':''}</div>
            <div class="ep-info">
              <div class="ep-code">${codeLine}</div>
              <div class="ep-title">${esc(ep.title||'')}</div>
            </div>
            ${st.watched&&st.watched_at?`<div class="ep-watched-at">${st.watched_at}</div>`:''}
            ${st.watch_count>1?`<div class="ep-watch-count">\xd7${st.watch_count}</div>`:''}
            <button class="ep-edit-btn" data-edit="${ep.episode_number}" title="${st.watched?'Watch history':'Log with date'}">${st.watched?'···':'+ date'}</button>
          </div>`;
      }

      const headerSegBar = segBarHTML(data.episodes.map(function(e) {
        return { number: e.episode_number, watched: e.watched };
      }));

      // Prev/next season
      const allSeasons = (detailData.seasons || []).sort((a, b) => a.season_number - b.season_number);
      const prevSeason = [...allSeasons].reverse().find(s => s.season_number < seasonNum);
      const nextSeason = allSeasons.find(s => s.season_number > seasonNum);

      app.innerHTML = `
        <div class="page">
          <div class="breadcrumb">
            <a data-nav="/library">Library</a>
            <span class="breadcrumb-sep">›</span>
            <a data-nav="/show/${tmdbId}">${esc(detailData.title)}</a>
            <span class="breadcrumb-sep">›</span>
            <span>${esc(data.name||`Season ${seasonNum}`)}</span>
          </div>
          <div class="ep-nav" style="margin-bottom:1.25rem">
            ${prevSeason
              ? `<a class="ep-nav-btn" data-nav="/show/${tmdbId}/season/${prevSeason.season_number}">← ${esc(prevSeason.name||'Season '+prevSeason.season_number)}</a>`
              : `<span class="ep-nav-btn ep-nav-disabled">← First season</span>`}
            ${nextSeason
              ? `<a class="ep-nav-btn ep-nav-next" data-nav="/show/${tmdbId}/season/${nextSeason.season_number}">${esc(nextSeason.name||'Season '+nextSeason.season_number)} →</a>`
              : `<span class="ep-nav-btn ep-nav-next ep-nav-disabled">Last season →</span>`}
          </div>
          <div style="display:flex;gap:1.25rem;align-items:flex-start;margin-bottom:1.5rem">
            ${data.poster_path
              ? `<img src="${img(data.poster_path,'w185')}" style="width:110px;border-radius:8px;flex-shrink:0;aspect-ratio:2/3;object-fit:cover" alt="" loading="lazy">`
              : ''}
            <div>
              <h1 style="font-size:1.4rem;font-weight:700;color:var(--accent);margin-bottom:0.2rem">${esc(data.name||`Season ${seasonNum}`)}</h1>
              <div style="color:var(--tx-dim);font-size:0.82rem">${data.air_date?data.air_date+' · ':''}${total} episodes</div>
              <div class="progress-row" style="margin-top:0.5rem" id="prog-text">${watched} / ${total} watched</div>
              <div id="prog-bar" style="max-width:220px;margin-top:0.3rem">${headerSegBar}</div>
              <div style="margin-top:0.5rem">
                <a href="https://www.themoviedb.org/tv/${tmdbId}/season/${seasonNum}" target="_blank" rel="noopener" style="font-size:0.78rem;color:var(--tx-dim);text-decoration:none;display:inline-block;margin-bottom:0.375rem">↗ TMDB</a>
                <div class="ext-links">${(detailData.wikis||[]).map(w => `<a class="ext-link" href="${esc(wikiSeasonUrl(w, seasonNum))}" target="_blank" rel="noopener">↗ ${esc(w.label)}</a>`).join('')}</div>
                ${extLinksHTML(detailData.title + ' Season ' + seasonNum, null, null, detailData.imdb_id ? `https://www.imdb.com/title/${detailData.imdb_id}/episodes/?season=${seasonNum}` : null)}
              </div>
              <div id="season-providers"></div>
            </div>
          </div>
          <div class="bulk-actions">
            <button class="btn btn-outline btn-sm" id="mark-all">Mark Season Watched</button>
          </div>
          <div class="episode-list" id="ep-list">
            ${data.episodes.map(epRowHTML).join('')}
          </div>
        </div>`;

      bindNav(app);

      // Load watch providers (non-blocking)
      loadProviders(app, tmdbId, '#season-providers', false);

      function updateProgress() {
        const w = Object.values(epState).filter(s => s.watched).length;
        const pt = app.querySelector('#prog-text');
        if (pt) pt.textContent = `${w} / ${total} watched`;
      }

      function updateRow(epNum) {
        const st = epState[epNum];
        const row = app.querySelector(`[data-ep="${epNum}"]`);
        if (!row) return;
        const check = row.querySelector('[data-check]');
        if (st.watched) { check.classList.add('watched'); check.textContent = '✓'; }
        else { check.classList.remove('watched'); check.textContent = ''; }
        row.classList.toggle('ep-row-watched', !!st.watched);
        // Update edit button label
        const editBtn = row.querySelector('.ep-edit-btn');
        if (editBtn) {
          editBtn.textContent = st.watched ? '···' : '+ date';
          editBtn.title = st.watched ? 'Watch history' : 'Log with date';
        }
        // Update watched_at and watch count badge
        const old = row.querySelector('.ep-watched-at');
        if (old) old.remove();
        const oldBadge = row.querySelector('.ep-watch-count');
        if (oldBadge) oldBadge.remove();
        if (st.watched && st.watched_at) {
          const d = document.createElement('div');
          d.className = 'ep-watched-at'; d.textContent = st.watched_at;
          editBtn.before(d);
        }
        if (st.watch_count > 1) {
          const b = document.createElement('div');
          b.className = 'ep-watch-count'; b.textContent = '\xd7' + st.watch_count;
          editBtn.before(b);
        }
        // Update header bar segment
        const seg = app.querySelector('#prog-bar .seg[data-seg="' + epNum + '"]');
        if (seg) seg.classList.toggle('w', st.watched);
      }

      // Episode list events
      app.querySelector('#ep-list').addEventListener('click', async e => {
        const check = e.target.closest('[data-check]');
        const editBtn = e.target.closest('[data-edit]');
        const row = e.target.closest('.episode-row');

        if (row && !check && !editBtn) {
          navigate(`/show/${tmdbId}/season/${seasonNum}/episode/${+row.dataset.ep}`);
          return;
        }

        if (check) {
          const epNum = +check.dataset.check;
          const newWatched = !epState[epNum].watched;
          const prevState = { ...epState[epNum] };
          epState[epNum] = { ...epState[epNum], watched: newWatched, watched_at: newWatched ? today() : null, watch_count: newWatched ? 1 : 0 };
          updateRow(epNum); updateProgress();
          try {
            await post('/episodes/watched', {
              tmdb_show_id: tmdbId, season_number: seasonNum,
              episode_number: epNum, watched: newWatched, watched_at: 'today',
            });
          } catch(err) {
            epState[epNum] = prevState; updateRow(epNum); updateProgress();
            alert('Error: ' + err.message);
          }
        }

        if (editBtn) {
          const epNum = +editBtn.dataset.edit;
          const st = epState[epNum];
          if (st.watched) {
            // Open watch history popover
            showWatchHistory(tmdbId, seasonNum, epNum, st.title || ('Episode ' + epNum), res => {
              if (res.watch_count !== undefined) {
                epState[epNum] = { ...epState[epNum], watch_count: res.watch_count };
                if (res.watched !== undefined) epState[epNum].watched = res.watched;
                if (res.watched_at !== undefined) epState[epNum].watched_at = res.watched_at;
              } else {
                // res is from POST /episodes/watched (new entry added)
                epState[epNum] = { ...epState[epNum], watch_count: res.watch_count, watched: true, watched_at: res.watched_at || epState[epNum].watched_at };
              }
              updateRow(epNum);
            });
          } else {
            showDatePicker(st.title || ('Episode ' + epNum), st.watched_at, async d => {
              try {
                await post('/episodes/watched', {
                  tmdb_show_id: tmdbId, season_number: seasonNum,
                  episode_number: epNum, watched: true, watched_at: d,
                });
                epState[epNum] = { ...epState[epNum], watched: true, watched_at: d, watch_count: 1 };
                updateRow(epNum); updateProgress();
              } catch(err) { alert('Error: ' + err.message); }
            });
          }
        }
      });

      // Mark all watched
      app.querySelector('#mark-all').addEventListener('click', async () => {
        try {
          await post('/episodes/watched/bulk', { tmdb_show_id: tmdbId, season_number: seasonNum, watched_at: 'today' });
          const tod = today();
          data.episodes.forEach(ep => { epState[ep.episode_number] = { ...epState[ep.episode_number], watched: true, watched_at: tod }; });
          data.episodes.forEach(ep => updateRow(ep.episode_number));
          updateProgress();
        } catch(e) { alert('Error: ' + e.message); }
      });
    }

    // ── Page: Episode ────────────────────────────────────────────────────────
    async function pageEpisode(app, tmdbId, seasonNum, epNum) {
      let seasonData, detailData;
      try {
        [seasonData, detailData] = await Promise.all([
          get(`/shows/${tmdbId}/season/${seasonNum}`),
          get(`/shows/${tmdbId}/detail`),

        app.innerHTML = `<div class="page"><div class="empty-state"><h3>Error</h3><p>${esc(e.message)}</p></div></div>`;

        return;
      }

      function rerender() { pageEpisode(app, tmdbId, seasonNum, epNum); }

      const tmdbEpUrl = `https://www.themoviedb.org/tv/${tmdbId}/season/${seasonNum}/episode/${epNum}`;

      app.innerHTML = `
        <div class="page">
          <div class="breadcrumb">
            <a data-nav="/library">Library</a>
            <span class="breadcrumb-sep">›</span>
            <a data-nav="/show/${tmdbId}">${esc(detailData.title)}</a>
            <span class="breadcrumb-sep">›</span>
            <a data-nav="/show/${tmdbId}/season/${seasonNum}">${esc(seasonData.name||`Season ${seasonNum}`)}</a>
            <span class="breadcrumb-sep">›</span>
            <span>${epCode(seasonNum, epNum)}</span>
          </div>
          <div id="ep-nav" class="ep-nav"></div>
          <div class="ep-hero">
            ${ep.still_path
              ? `<img class="ep-still-thumb" src="${img(ep.still_path,'w300')}" alt="" loading="lazy">`
              : `<div class="ep-still-placeholder">No image</div>`}
            <div class="ep-info">
              <div class="ep-title-main">${esc(ep.title||`Episode ${epNum}`)}</div>
              <div class="ep-meta-row">${epCode(seasonNum, epNum)}${ep.air_date?' · '+ep.air_date:''}</div>
              <div class="ep-watch-row" id="watch-row">
                ${ep.watched
                  ? `<span style="color:var(--accent);font-size:0.9rem">✓ Watched${ep.watched_at?' · '+ep.watched_at:''}</span>
                     <button class="btn btn-outline btn-sm" id="ep-log-rewatch">+ Log Rewatch</button>
                     <button class="btn btn-ghost btn-sm" id="ep-unwatch" style="color:var(--tx-dim)">Unwatch</button>`
                  : `<button class="btn btn-accent" id="ep-watch">Mark Watched</button>
                     <button class="btn btn-outline btn-sm" id="ep-watch-date">Log with date</button>`}
              </div>
              <a href="${tmdbEpUrl}" target="_blank" rel="noopener" style="font-size:0.78rem;color:var(--tx-dim);text-decoration:none;display:inline-block;margin-bottom:0.375rem">↗ TMDB</a>
              <div class="ext-links">${(detailData.wikis||[]).map(w => `<a class="ext-link" href="${esc(wikiSeasonUrl(w, seasonNum))}" target="_blank" rel="noopener">↗ ${esc(w.label)}</a>`).join('')}</div>
              ${extLinksHTML(ep.title || epCode(seasonNum, epNum) + ' ' + detailData.title, null, null, detailData.imdb_id ? `https://www.imdb.com/title/${detailData.imdb_id}/episodes/?season=${seasonNum}` : null)}
            </div>
          </div>
          ${ep.watched ? `<button class="wh-toggle-btn" id="wh-toggle"><span id="wh-arrow">▸</span> Watch history (<span id="wh-count">…</span>)</button>
          <div id="ep-watch-history" style="display:none;margin-bottom:1rem"></div>` : ''}
          <div id="ep-providers"></div>
          ${ep.overview?`<p style="color:var(--tx-dim);line-height:1.7;margin-bottom:2rem">${esc(ep.overview)}</p>`:''}
          <div id="ep-cast-section"><div class="loading" style="padding:1rem 0;text-align:left">Loading cast…</div></div>
        </div>`;

      bindNav(app);

      // Prev/Next nav
      const allSeasons = (detailData.seasons || [])
        .sort((a, b) => a.season_number - b.season_number);
      const currentEps = seasonData.episodes.slice()
        .sort((a, b) => a.episode_number - b.episode_number);
      const idx = currentEps.findIndex(e => e.episode_number === epNum);

      let prevTarget = null;
      if (idx > 0) {
        const p = currentEps[idx - 1];
        prevTarget = { sn: seasonNum, en: p.episode_number, label: epCode(seasonNum, p.episode_number) };
      } else {
        const prevSeason = [...allSeasons].reverse().find(s => s.season_number < seasonNum);
        if (prevSeason && prevSeason.episode_count > 0) {
          prevTarget = { sn: prevSeason.season_number, en: prevSeason.episode_count,
                         label: epCode(prevSeason.season_number, prevSeason.episode_count) };
        }
      }

      let nextTarget = null;
      if (idx >= 0 && idx < currentEps.length - 1) {
        const n = currentEps[idx + 1];
        nextTarget = { sn: seasonNum, en: n.episode_number, label: epCode(seasonNum, n.episode_number) };
      } else {
        const nextSeason = allSeasons.find(s => s.season_number > seasonNum);
        if (nextSeason) {
          nextTarget = { sn: nextSeason.season_number, en: 1,
                         label: epCode(nextSeason.season_number, 1) };
        }
      }

      const navEl = app.querySelector('#ep-nav');
      navEl.innerHTML =
        (prevTarget
          ? `<a class="ep-nav-btn" data-nav="/show/${tmdbId}/season/${prevTarget.sn}/episode/${prevTarget.en}">← ${prevTarget.label}</a>`
          : `<span class="ep-nav-btn ep-nav-disabled">← First episode</span>`)
        + (nextTarget
          ? `<a class="ep-nav-btn ep-nav-next" data-nav="/show/${tmdbId}/season/${nextTarget.sn}/episode/${nextTarget.en}">${nextTarget.label} →</a>`
          : `<span class="ep-nav-btn ep-nav-next ep-nav-disabled">Last episode →</span>`);
      bindNav(navEl);

      // Watch history toggle
      const whToggle = app.querySelector('#wh-toggle');
      const whSection = app.querySelector('#ep-watch-history');
      const whArrow = app.querySelector('#wh-arrow');
      let whLoaded = false;

      if (whToggle && whSection) {
        get(`/shows/${tmdbId}/season/${seasonNum}/episode/${epNum}/watch-history`)
          .then(d => { const c = app.querySelector('#wh-count'); if (c) c.textContent = d.entries.length; })
          .catch(() => {});

        whToggle.addEventListener('click', () => {
          const open = whSection.style.display !== 'none';
          whSection.style.display = open ? 'none' : 'block';
          if (whArrow) whArrow.textContent = open ? '▸' : '▾';
          if (open || whLoaded) return;
          whLoaded = true;
          whSection.innerHTML = '<div class="loading" style="font-size:0.85rem;padding:0.5rem 0">Loading\u2026</div>';
          get('/shows/' + tmdbId + '/season/' + seasonNum + '/episode/' + epNum + '/watch-history').then(function(d) {
            if (!d.entries.length) { whSection.innerHTML = ''; return; }
            let html = '<div style="margin-bottom:0.5rem;font-size:0.8rem;font-weight:600;color:var(--tx-dim);text-transform:uppercase;letter-spacing:0.05em">Watch History</div>';
            d.entries.forEach(function(e) {
              html += '<div class="wh-entry" data-id="' + e.id + '">' +
                '<span>' + (e.watched_at || 'date unknown') + '</span>' +
                '<button class="btn btn-ghost btn-sm wh-delete" data-id="' + e.id + '" title="Remove">\u2715</button>' +
                '</div>';
            });
            whSection.innerHTML = html;
            whSection.querySelectorAll('.wh-delete').forEach(function(btn) {
              btn.addEventListener('click', async function() {
                const res = await del('/episodes/history/' + btn.dataset.id);
                if (!res.watched) { rerender(); return; }
                btn.closest('.wh-entry')?.remove();
                const updated = await get('/shows/' + tmdbId + '/season/' + seasonNum + '/episode/' + epNum + '/watch-history');
                const c = app.querySelector('#wh-count'); if (c) c.textContent = updated.entries.length;
                if (!updated.entries.length) whSection.innerHTML = '';
              });
            });
          }).catch(function() { whSection.innerHTML = ''; });
        });
      }

      // Load watch providers (non-blocking)
      loadProviders(app, tmdbId, '#ep-providers', false);

      app.querySelector('#ep-watch')?.addEventListener('click', async () => {
        await post('/episodes/watched', { tmdb_show_id: tmdbId, season_number: seasonNum, episode_number: epNum, watched: true, watched_at: 'today' });
        rerender();
      });
      app.querySelector('#ep-watch-date')?.addEventListener('click', () => {
        showDatePicker(ep.title||`Episode ${epNum}`, null, async d => {
          await post('/episodes/watched', { tmdb_show_id: tmdbId, season_number: seasonNum, episode_number: epNum, watched: true, watched_at: d });
          rerender();
        });
      });
      app.querySelector('#ep-log-rewatch')?.addEventListener('click', () => {
        showDatePicker(ep.title||('Episode ' + epNum), null, async d => {
          await post('/episodes/watched', { tmdb_show_id: tmdbId, season_number: seasonNum, episode_number: epNum, watched: true, watched_at: d });
          rerender();
        });
      });
      app.querySelector('#ep-unwatch')?.addEventListener('click', async () => {
        await post('/episodes/watched', { tmdb_show_id: tmdbId, season_number: seasonNum, episode_number: epNum, watched: false });
        rerender();
      });

      // Load episode cast (non-blocking)
      get(`/shows/${tmdbId}/season/${seasonNum}/episode/${epNum}/cast`).then(castData => {
        const section = app.querySelector('#ep-cast-section');
        if (!section) return;
        let html = '';
        if (castData.cast.length) html += castGridHTML(castData.cast, 'Cast');
        if (castData.guest_stars.length) html += castGridHTML(castData.guest_stars, 'Guest Stars');
        section.innerHTML = html || '';
        if (html) bindNav(section);
      }).catch(() => {
        const section = app.querySelector('#ep-cast-section');
        if (section) section.innerHTML = '';
      });
    }

    // ── Page: Movie ──────────────────────────────────────────────────────────
    async function pageMovie(app, tmdbId) {
      let detail;
      try { detail = await get(`/movies/${tmdbId}`); }
      catch(e) {
        app.innerHTML = `<div class="page"><div class="empty-state"><h3>Movie not found</h3></div></div>`;
        return;
      }

      const year = detail.release_date || '';
      const genres = (detail.genres || []).join(', ');
      const runtime = detail.runtime ? `${detail.runtime} min` : '';
      const meta = [year, runtime, genres].filter(Boolean).join(' · ');

      const MOVIE_STATUS_LABEL = { watchlist: 'Watchlist', finished: 'Finished', abandoned: 'Abandoned' };
      const MOVIE_STATUS_COLOR = { watchlist: 'var(--blue)', finished: 'var(--cyan)', abandoned: 'var(--muted)' };

      const addBannerHTML = !detail.tracked ? `
        <div class="add-banner" id="add-banner">
          <h3>Add to Library</h3>
          <p>Choose a status to start tracking</p>
          <div class="add-status-row">
            ${Object.entries(MOVIE_STATUS_LABEL).map(([k,v]) =>
              `<button class="add-status-opt ${k==='watchlist'?'selected':''}" data-status="${k}">${v}</button>`
            ).join('')}
          </div>
          <button class="btn btn-accent" id="add-btn" style="margin-top:0.5rem">Add to Library</button>
        </div>` : '';

      const statusHTML = detail.tracked ? `
        <div class="status-selector">
          ${Object.entries(MOVIE_STATUS_LABEL).map(([k,v]) =>
            `<button class="status-btn ${detail.user_status===k?'active':''}" data-status="${k}">${v}</button>`
          ).join('')}
        </div>` : '';

      const watchedBtnLabel = detail.watched ? '✓ Watched' : 'Mark Watched';
      const watchedBtnClass = detail.watched ? 'btn-accent' : 'btn-outline';
      const watchedHTML = detail.tracked ? `
        <div style="margin:0.75rem 0">
          <button class="btn ${watchedBtnClass}" id="watched-btn">${watchedBtnLabel}</button>
          ${detail.watched_at ? `<span style="font-size:0.78rem;color:var(--tx-dim);margin-left:0.75rem">${detail.watched_at}</span>` : ''}
        </div>` : '';

      app.innerHTML = `
        <div class="page">
          <div class="breadcrumb">
            <a data-nav="/library">Library</a>
          </div>
          ${addBannerHTML}
          <div class="show-hero">
            ${detail.poster_path
              ? `<img class="show-poster" src="${img(detail.poster_path,'w300')}" alt="${esc(detail.title)}">`
              : ''}
            <div class="show-info">
              <h1 class="show-title">${esc(detail.title)}</h1>
              <div class="show-meta">${esc(meta)}</div>
              <a href="https://www.themoviedb.org/movie/${tmdbId}" target="_blank" rel="noopener" style="font-size:0.78rem;color:var(--tx-dim);text-decoration:none;display:inline-block;margin-bottom:0.375rem">↗ TMDB</a>
              ${extLinksHTML(detail.title, detail.imdb_id, 'title')}
              ${statusHTML}
              ${watchedHTML}
              ${detail.overview
                ? `<p class="show-overview${detail.overview.length > 280 ? ' show-overview-clamped' : ''}" id="show-overview">${esc(detail.overview)}</p>
                   ${detail.overview.length > 280 ? `<span class="show-more-btn" id="show-more">Show more ▾</span>` : ''}`
                : ''}
            </div>
          </div>
          <div class="section" style="margin-top:1.75rem">
            <div class="section-header"><h2 style="color:var(--accent)">Cast</h2></div>
            <div id="cast-pane"><div class="loading" style="padding:0.5rem 0;text-align:left;font-size:0.85rem">Loading cast…</div></div>
          </div>
        </div>`;

      bindNav(app);

      app.querySelector('#show-more')?.addEventListener('click', function() {
        app.querySelector('#show-overview')?.classList.remove('show-overview-clamped');
        this.remove();
      });

      // Status buttons
      app.querySelectorAll('.status-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await patch(`/movies/${tmdbId}/status`, { user_status: btn.dataset.status });
            app.querySelectorAll('.status-btn').forEach(b =>
              b.classList.toggle('active', b.dataset.status === btn.dataset.status));
          } catch(e) { alert('Error: ' + e.message); }
        });
      });

      // Watched toggle
      app.querySelector('#watched-btn')?.addEventListener('click', async () => {
        try {
          const res = await post(`/movies/${tmdbId}/watched`, {});
          const btn = app.querySelector('#watched-btn');
          if (res.watched) {
            btn.textContent = '✓ Watched';
            btn.className = 'btn btn-accent';
          } else {
            btn.textContent = 'Mark Watched';
            btn.className = 'btn btn-outline';
          }
        } catch(e) { alert('Error: ' + e.message); }
      });

      // Add banner
      if (!detail.tracked) {
        let selStatus = 'watchlist';
        app.querySelectorAll('.add-status-opt').forEach(o => {
          o.addEventListener('click', () => {
            selStatus = o.dataset.status;
            app.querySelectorAll('.add-status-opt').forEach(x => x.classList.toggle('selected', x===o));
          });
        });
        app.querySelector('#add-btn')?.addEventListener('click', async () => {
          try {
            await post('/movies', { tmdb_id: tmdbId, user_status: selStatus });
            navigate(`/movie/${tmdbId}`);
          } catch(e) { alert('Error: ' + e.message); }
        });
      }

      // Load cast (non-blocking) — only works if movie is tracked
      if (detail.tracked) {
        get(`/movies/${tmdbId}/cast`).then(cast => {
          const pane = app.querySelector('#cast-pane');
          if (!pane) return;
          pane.innerHTML = castGridHTML(cast);
          bindNav(pane);
        }).catch(() => {
          const pane = app.querySelector('#cast-pane');
          if (pane) pane.innerHTML = '';
        });
      } else {
        const pane = app.querySelector('#cast-pane');
        if (pane) pane.innerHTML = '<p style="color:var(--tx-dim);font-size:0.85rem">Add movie to library to see cast.</p>';
      }
    }

    // ── Page: Person ─────────────────────────────────────────────────────────
    async function pagePerson(app, tmdbId) {
      let data;
      try { data = await get(`/people/${tmdbId}/seen-in`); }
      catch(e) {
        app.innerHTML = `
          <div class="page">
            <div class="empty-state">
              <h3>Person not cached</h3>
              <p>Open a show's Cast tab to load this person first.</p>
              <button class="btn btn-ghost" style="margin-top:1rem" onclick="history.back()">← Go Back</button>
            </div>
          </div>`;
        return;
      }

      const { person, main_cast, guest } = data;
      const allSeen = [...main_cast, ...guest];

      const mainHTML = main_cast.length ? `
        <div class="seen-in-section">
          <div class="seen-in-label">Main cast in ${main_cast.length} title${main_cast.length!==1?'s':''} you've watched</div>
          <div class="seen-in-grid">
            ${main_cast.map(c => {
              const nav = c.type === 'movie' ? `/movie/${c.tmdb_id}` : `/show/${c.tmdb_id}`;
              return `
              <div class="seen-in-card" data-nav="${nav}">
                ${c.poster_path
                  ? `<img src="${img(c.poster_path,'w185')}" alt="${esc(c.title)}" loading="lazy">`
                  : `<div class="seen-in-card-placeholder">${esc(c.title)}</div>`}
                <div class="seen-in-title">${esc(c.title)}</div>
                <div class="seen-in-char">${esc(c.character||'')}</div>
                ${c.type === 'movie' ? '<div class="seen-in-year" style="color:var(--blue)">Movie</div>' : ''}
                ${(() => { const p=[c.first_air_date?c.first_air_date.slice(0,4):null,c.age_at_filming!=null?`age ${c.age_at_filming}`:null].filter(Boolean); return p.length?`<div class="seen-in-year">${p.join(' · ')}</div>`:''; })()}
              </div>`;
            }).join('')}
          </div>
        </div>` : '';

      const guestHTML = guest.length ? `
        <div class="section" style="margin-bottom:2rem">
          <div class="section-header"><h2 style="color:var(--accent)">Guest Appearances</h2></div>
          <div>
            ${guest.map(c => {
              const isMovie = c.type === 'movie';
              const nav = isMovie
                ? `/movie/${c.tmdb_id}`
                : (c.season_number && c.episode_number)
                  ? `/show/${c.tmdb_id}/season/${c.season_number}/episode/${c.episode_number}`
                  : `/show/${c.tmdb_id}`;
              const epLabel = (!isMovie && c.season_number && c.episode_number)
                ? ' · ' + epCode(c.season_number, c.episode_number)
                : '';
              const typeLabel = isMovie ? ' · Movie' : '';
              return `<div class="guest-row" data-nav="${nav}">
                <div class="guest-info">
                  <div class="guest-show-title">${esc(c.title)}</div>
                  <div class="guest-detail">${esc(c.character||'')}${epLabel}${typeLabel}${c.first_air_date?' · '+c.first_air_date.slice(0,4):''}${c.age_at_filming!=null?' · age '+c.age_at_filming:''}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>` : '';

      const noSeenHTML = (!main_cast.length && !guest.length) ? `
        <div style="background:var(--surface);border-radius:10px;padding:1rem;margin-bottom:2rem;color:var(--tx-dim);font-size:0.875rem">
          No overlap with your watch history yet.
        </div>` : '';

      app.innerHTML = `
        <div class="page">
          <div class="person-hero">
            ${person.profile_path
              ? `<img class="person-photo" src="${img(person.profile_path,'w185')}" alt="${esc(person.name)}">`
              : `<div class="person-photo-placeholder">👤</div>`}
            <div>
              <h1 class="person-name">${esc(person.name)}</h1>
              <a href="https://www.themoviedb.org/person/${tmdbId}" target="_blank" rel="noopener" style="font-size:0.78rem;color:var(--tx-dim);text-decoration:none;display:inline-block;margin-bottom:0.375rem">↗ TMDB</a>
              ${extLinksHTML(person.name, person.imdb_id, 'name')}
            </div>
          </div>
          ${mainHTML}${guestHTML}${noSeenHTML}
          <div class="section-header">
            <h2 style="color:var(--accent)">All Credits</h2>
            <span class="section-count" id="credits-count">…</span>
          </div>
          <div id="all-credits"><div class="loading">Loading…</div></div>
        </div>`;

      bindNav(app);

      // Load all credits
      const seenIds = new Set(allSeen.map(c => c.tmdb_id));
      try {
        const credits = await get(`/people/${tmdbId}/all-credits`);
        app.querySelector('#credits-count').textContent = credits.length;
        if (!credits.length) {
          app.querySelector('#all-credits').innerHTML = '<p style="color:var(--tx-dim)">No credits cached.</p>';
        } else {
          app.querySelector('#all-credits').innerHTML = `
            <div class="credits-list">
              ${credits.map(c => `
                <div class="credit-row" data-nav="/${c.type === 'movie' ? 'movie' : 'show'}/${c.show_tmdb_id}">
                  ${c.poster_path
                    ? `<img class="credit-poster" src="${img(c.poster_path,'w92')}" alt="${esc(c.title)}" loading="lazy">`
                    : `<div class="credit-poster-ph"></div>`}
                  <div class="credit-info">
                    <div class="credit-title">${esc(c.title)}</div>
                    <div class="credit-char">${esc(c.character||'')}${c.type?' · '+c.type:''}${c.first_air_date?' · '+c.first_air_date.slice(0,4):''}</div>
                  </div>
                  ${seenIds.has(c.show_tmdb_id)?'<div class="credit-dot" title="In your watch history"></div>':''}
                </div>`).join('')}
            </div>`;
          bindNav(app.querySelector('#all-credits'));
        }
      } catch(e) {
        app.querySelector('#all-credits').innerHTML = `<p style="color:var(--tx-dim)">Could not load credits.</p>`;
      }
    }

    // ── Page: Settings ───────────────────────────────────────────────────────
    function pageSettings(app) {
      const services = ['Netflix','Hulu','Max','Apple TV+','Peacock','Paramount+','Disney+','Prime Video','Tubi','Crunchyroll','Shudder','MUBI'];
      const saved = JSON.parse(localStorage.getItem('whist_services')||'[]');

      app.innerHTML = `
        <div class="page">
          <div class="page-header"><h1>Settings</h1></div>
          <div style="max-width:440px">
            <div style="background:var(--surface);border-radius:12px;padding:1.25rem">
              <h2 style="font-size:1rem;margin-bottom:0.25rem">My Streaming Services</h2>
              <p style="font-size:0.82rem;color:var(--tx-dim);margin-bottom:1rem">Preferred services appear first; others are hidden behind a toggle.</p>
              <div id="svc-list" style="display:flex;flex-direction:column;gap:0.25rem">
                ${services.map(s => `
                  <label style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem;border-radius:8px;cursor:pointer">
                    <input type="checkbox" value="${esc(s)}" ${saved.includes(s)?'checked':''} style="accent-color:var(--accent);width:16px;height:16px">
                    <span>${esc(s)}</span>
                  </label>`).join('')}
              </div>
              <button class="btn btn-accent" style="margin-top:1rem;width:100%" id="save-btn">Save Preferences</button>
            </div>
          </div>
        </div>`;

      app.querySelector('#save-btn').addEventListener('click', () => {
        const checked = [...app.querySelectorAll('#svc-list input:checked')].map(i => i.value);
        localStorage.setItem('whist_services', JSON.stringify(checked));
        const btn = app.querySelector('#save-btn');
        btn.textContent = 'Saved ✓';
        setTimeout(() => { btn.textContent = 'Save Preferences'; }, 1500);
      });
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
