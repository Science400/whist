<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHIST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Flexoki variables ──────────────────────────────────────────────── */
    :root {
      --bg:        #100F0F;
      --surface:   #1C1B1A;
      --surface-2: #282726;
      --border:    #403E3C;
      --muted:     #575653;
      --tx-dim:    #878580;
      --tx:        #CECDC3;
      --red:    #AF3029;
      --orange: #CB7A29;
      --yellow: #D0A215;
      --green:  #66800B;
      --cyan:   #24837B;
      --blue:   #205EA6;
      --purple: #5E409D;
      --accent: var(--red);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:        #FFFCF0;
        --surface:   #F2F0E5;
        --surface-2: #E6E4D9;
        --border:    #CECDC3;
        --muted:     #B7B5AC;
        --tx-dim:    #6F6E69;
        --tx:        #100F0F;
        --red:    #AF3029;
        --orange: #AD5700;
        --yellow: #AD8301;
        --green:  #66800B;
        --cyan:   #24837B;
        --blue:   #205EA6;
        --purple: #5E409D;
      }
    }

    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--tx);
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    input { font: inherit; }

    /* ── Mono accents (codes, dates, counts) ────────────────────────────── */
    .ep-code, .ep-air-date, .ep-watched-at, .ep-watch-count,
    .sched-date, .cast-badge, .section-count,
    .sched-new-badge, .sched-available-badge, .sched-pace-badge {
      font-family: 'Geist Mono', monospace;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #top-nav { position: sticky; top: 0; z-index: 50; }
    #app { min-height: calc(100vh - 52px); }
    #bottom-nav { display: none; }

    /* ── Top nav bar ────────────────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0 1.5rem;
      height: 52px;
      background: color-mix(in srgb, var(--surface) 85%, var(--bg));
      border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: 'Geist Mono', monospace;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: var(--red);
    }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link {
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      color: var(--tx-dim);
      font-size: 0.85rem; font-weight: 500;
      transition: color 0.1s, background 0.1s;
    }
    .nav-link:hover { background: var(--surface-2); color: var(--tx); }
    .nav-link.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .nav-spacer { flex: 1; }
    .nav-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      color: var(--tx-dim);
      font-size: 1.1rem;
      transition: background 0.1s, color 0.1s;
    }
    .nav-icon:hover { background: var(--surface-2); color: var(--tx); }

    /* ── Bottom nav (mobile) ────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 58px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 50;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      color: var(--tx-dim);
      font-size: 10px;
      padding: 6px 0;
      transition: color 0.1s;
    }
    .bottom-nav-item .bn-icon { font-size: 1.2rem; line-height: 1; }
    .bottom-nav-item.active { color: var(--accent); }

    /* ── Page container ─────────────────────────────────────────────────── */
    .page { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .page-header p { color: var(--tx-dim); margin-top: 0.2rem; }

    /* ── Breadcrumb ─────────────────────────────────────────────────────── */
    .breadcrumb {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: var(--tx-dim);
      margin-bottom: 1.25rem;
    }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { opacity: 0.4; }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
      font-size: 0.875rem; font-weight: 500;
      transition: opacity 0.1s, background 0.1s;
    }
    .btn-accent { background: var(--accent); color: #fff; border: none; }
    .btn-accent:hover { opacity: 0.88; }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
    /* ── External links ─────────────────────────────────────────────────── */
    .ext-links { display: flex; gap: 0.375rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .ext-link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 6px;
      font-size: 0.72rem; font-weight: 500;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--tx-dim); text-decoration: none;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .ext-link:hover { background: var(--border); color: var(--tx); border-color: var(--muted); }
    .wiki-pill { display: inline-flex; align-items: center; }
    .wiki-pill .ext-link { border-radius: 6px 0 0 6px; }
    .wiki-del {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.35rem;
      border-radius: 0 6px 6px 0; border: 1px solid var(--border); border-left: none;
      background: var(--surface-2); color: var(--tx-dim);
      font-size: 0.75rem; line-height: 1; cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .wiki-del:hover { background: var(--border); color: var(--tx); }
    .btn-ghost { background: var(--surface-2); color: var(--tx-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }
    .btn-sm { padding: 0.25rem 0.625rem; font-size: 0.78rem; }

    /* ── Poster grid ────────────────────────────────────────────────────── */
    .poster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }
    .poster-card { cursor: pointer; }
    .poster-card img {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 10px;
      background: var(--surface-2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .poster-card:hover img {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .poster-placeholder {
      width: 100%; aspect-ratio: 2/3;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 0.7rem; text-align: center;
      padding: 0.5rem;
    }
    .poster-card .card-title {
      font-size: 0.78rem; margin-top: 0.4rem; color: var(--tx);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.2rem; font-size: 0.65rem; color: var(--tx-dim);
      font-family: 'Geist Mono', monospace;
    }
    .card-progress {
      height: 2px; border-radius: 1px;
      background: color-mix(in srgb, var(--border) 60%, transparent);
      margin-top: 0.3rem; overflow: hidden;
    }
    .card-progress-fill { height: 100%; background: var(--accent); }

    /* ── Section header ─────────────────────────────────────────────────── */
    .section { margin-bottom: 4rem; }
    .section-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.875rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      position: sticky; top: 52px; z-index: 10;
      background: var(--bg);
    }
    .section-header h2 {
      font-size: 0.875rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--tx);
      padding-left: 0.625rem;
      border-left: 3px solid currentColor;
    }
    .section-count {
      background: var(--surface-2); color: var(--tx-dim);
      border-radius: 6px; padding: 0.15rem 0.5rem; font-size: 0.68rem; font-weight: 600;
    }

    /* ── Library search + sort controls ────────────────────────────────── */
    .library-controls {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .library-controls input[type="search"] {
      flex: 1; min-width: 160px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--tx); padding: 0.4rem 0.65rem;
      font-size: 0.85rem; outline: none;
    }
    .library-controls input[type="search"]::placeholder { color: var(--tx-dim); }
    .library-controls input[type="search"]:focus { border-color: var(--accent); }
    .library-controls select {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--tx); padding: 0.4rem 0.65rem;
      font-size: 0.85rem; cursor: pointer; outline: none;
    }

    /* ── Show detail header ─────────────────────────────────────────────── */
    .show-hero { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 1.25rem; }
    .show-poster {
      width: 110px; flex-shrink: 0;
      border-radius: 8px; aspect-ratio: 2/3;
      object-fit: cover; background: var(--surface-2);
    }
    .show-info { flex: 1; min-width: 0; }
    .show-title { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
    .show-meta { color: var(--tx-dim); font-size: 0.82rem; margin-bottom: 0.5rem; }
    .show-overview { color: var(--tx-dim); font-size: 0.875rem; line-height: 1.65; margin-top: 0.75rem; }
    .show-overview-clamped { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .show-more-btn { display: inline-block; margin-top: 0.35rem; font-size: 0.78rem; color: var(--tx-dim); cursor: pointer; }
    .show-more-btn:hover { color: var(--tx); }

    /* ── Status selector ────────────────────────────────────────────────── */
    .status-selector { display: flex; gap: 0.375rem; flex-wrap: wrap; margin: 0.75rem 0; }
    .status-btn {
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      color: var(--tx-dim); font-size: 0.78rem;
      transition: all 0.12s;
    }
    .status-btn:hover { border-color: var(--accent); color: var(--accent); }
    .status-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

    /* ── Progress ───────────────────────────────────────────────────────── */
    .progress-row { font-size: 0.78rem; color: var(--tx-dim); margin: 0.5rem 0 0.25rem; }
    .progress-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); }

    /* ── Watch providers ────────────────────────────────────────────────── */
    .provider-row { display: flex; gap: 1.25rem; flex-wrap: wrap; margin: 0.75rem 0; }
    .provider-group { display: flex; align-items: center; gap: 0.5rem; }
    .provider-label { font-size: 0.7rem; color: var(--tx-dim); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .provider-logos { display: flex; gap: 0.375rem; flex-wrap: wrap; align-items: center; }
    .provider-logo {
      width: 32px; height: 32px;
      border-radius: 7px; overflow: hidden;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      opacity: 0.55; font-size: 0.65rem; font-weight: 600; color: var(--tx-dim);
      transition: opacity 0.15s;
    }
    .provider-logo img { width: 100%; height: 100%; object-fit: cover; }
    .provider-logo.provider-pref { opacity: 1; box-shadow: 0 0 0 2px var(--accent); }
    .provider-logo:hover { opacity: 1; }
    /* "others" toggle button */
    .provider-toggle {
      height: 32px; min-width: 28px; padding: 0 7px;
      border-radius: 7px;
      background: var(--surface-2); color: var(--tx-dim);
      font-size: 0.68rem; font-weight: 600;
      border: 1px solid var(--border); cursor: pointer;
      align-self: center;
      transition: background 0.1s, color 0.1s;
    }
    .provider-toggle:hover { background: var(--border); color: var(--tx); }
    /* hidden overflow span — display:contents makes children join the flex row */
    .provider-overflow { display: none; gap: 0.375rem; }
    .provider-overflow.open { display: contents; }

    /* ── Schedule card provider logos (compact, preferred-only) ─────────── */
    .sched-providers { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .sched-providers .provider-logo { width: 22px; height: 22px; border-radius: 5px; }

    /* ── Season list ────────────────────────────────────────────────────── */
    .season-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .season-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.875rem 1rem;
      background: var(--surface); border-radius: 10px;
      cursor: pointer; color: var(--tx);
      transition: background 0.1s;
    }
    .season-row:hover { background: var(--surface-2); }
    .season-thumb {
      width: 46px; height: 70px;
      object-fit: cover; border-radius: 5px;
      background: var(--surface-2); flex-shrink: 0;
    }
    .season-thumb-placeholder {
      width: 46px; height: 70px;
      background: var(--surface-2); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 0.7rem; font-weight: 600;
      flex-shrink: 0;
    }
    .season-info { flex: 1; min-width: 0; }
    .season-name { font-weight: 500; font-size: 0.9rem; }
    .season-meta { font-size: 0.78rem; color: var(--tx-dim); margin: 0.2rem 0 0.4rem; }
    /* Segmented episode bar — no gap, container clips rounded corners */
    .seg-bar { display: flex; gap: 0; height: 3px; border-radius: 2px; overflow: hidden; }
    .seg-bar .seg { flex: 1; min-width: 1px; height: 100%; background: var(--border); }
    .seg-bar .seg.w { background: var(--accent); }
    .season-chevron { color: var(--tx-dim); font-size: 1.1rem; }

    /* ── Cast grid ──────────────────────────────────────────────────────── */
    .cast-section { margin-top: 0.5rem; }
    .cast-section-label {
      font-size: 0.875rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.5rem 0 0.5rem 0.625rem; border-left: 3px solid currentColor;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      margin-bottom: 0.875rem;
    }
    .cast-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 0.875rem 0.625rem;
    }
    .cast-item { cursor: pointer; padding-top: 7px; }
    .cast-photo-wrap { position: relative; }
    .cast-photo {
      width: 76px; height: 76px;
      object-fit: cover;
      border-radius: 18%;
      background: var(--surface-2);
      display: block;
    }
    .cast-photo-placeholder {
      width: 76px; height: 76px;
      border-radius: 18%;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 1.25rem;
    }
    .cast-badge {
      position: absolute; top: -5px; right: -5px;
      min-width: 20px; height: 20px;
      border-radius: 6px;
      background: var(--accent); color: #fff;
      font-size: 0.68rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0.15rem 0.4rem;
      border: 2px solid var(--bg);
      pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .cast-name { font-size: 0.68rem; color: var(--tx); margin-top: 0.35rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .cast-char { font-size: 0.62rem; color: var(--tx-dim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .cast-see-more {
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 0.72rem; text-align: center;
      cursor: pointer; min-height: 76px;
    }
    .cast-see-more:hover { color: var(--accent); }

    /* ── Schedule cards ─────────────────────────────────────────────────── */
    .schedule-section { margin-bottom: 2rem; }
    .schedule-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .schedule-card {
      display: flex; gap: 0.875rem; align-items: center;
      padding: 0.625rem 0.75rem 0.625rem 0.875rem;
      background: var(--surface); border-radius: 10px;
      border-left: 2.5px solid var(--accent);
      cursor: pointer; transition: background 0.1s;
    }
    .schedule-card:hover { background: var(--surface-2); }
    .sched-poster {
      width: 52px; height: 78px;
      object-fit: cover; border-radius: 6px;
      background: var(--surface-2); flex-shrink: 0;
    }
    .sched-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.2rem; }
    .sched-title-row { display: flex; align-items: center; gap: 0.5rem; }
    .sched-title { font-weight: 500; font-size: 0.9rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .sched-ep { display: flex; flex-direction: column; gap: 0.1rem; }
    .sched-date { font-size: 0.72rem; color: var(--tx-dim); }
    .sched-new-badge {
      flex-shrink: 0;
      background: var(--orange); color: #fff;
      border-radius: 6px; padding: 0.15rem 0.5rem;
      font-size: 0.68rem; font-weight: 700;
    }
    .sched-available-badge { flex-shrink: 0; background: var(--orange); color: #fff; border-radius: 6px; padding: 0.15rem 0.5rem; font-size: 0.68rem; font-weight: 600; }
    .sched-pace-badge { flex-shrink: 0; background: var(--accent); color: #fff; border-radius: 6px; padding: 0.15rem 0.5rem; font-size: 0.68rem; font-weight: 600; }
    .sched-ep-code { font-family: 'Geist Mono', monospace; font-size: 0.72rem; color: var(--tx); flex-shrink: 0; }
    .sched-ep-title { font-size: 0.78rem; color: var(--tx-dim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .schedule-cap-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; font-size: 0.82rem; color: var(--tx-dim); }
    .cap-stepper { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .cap-stepper button { background: var(--surface-2); border: none; color: var(--tx-dim); width: 28px; height: 28px; font-size: 1rem; cursor: pointer; transition: background 0.1s; }
    .cap-stepper button:hover { background: var(--border); color: var(--tx); }
    .cap-stepper span { padding: 0 0.5rem; font-family: 'Geist Mono', monospace; font-size: 0.82rem; color: var(--tx); min-width: 2ch; text-align: center; }
    .schedule-cap-hit { padding: 0.625rem 0.75rem; background: var(--surface); border-radius: 10px; font-size: 0.82rem; color: var(--tx-dim); text-align: center; margin-top: 0.5rem; }

    /* ── Pace selector (show detail page) ───────────────────────────────── */
    .pace-selector { display: flex; gap: 0.375rem; flex-wrap: wrap; margin: 0 0 0.75rem; align-items: center; }
    .pace-label { font-size: 0.72rem; color: var(--tx-dim); margin-right: 0.25rem; }
    .pace-btn { padding: 0.25rem 0.7rem; border-radius: 8px; border: 1.5px solid var(--border); color: var(--tx-dim); font-size: 0.75rem; transition: all 0.12s; }
    .pace-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pace-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

    /* ── Episode list ───────────────────────────────────────────────────── */
    .episode-list { display: flex; flex-direction: column; }
    .episode-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      transition: background 0.08s;
    }
    .episode-row:hover { background: var(--surface); border-radius: 6px; }
    .episode-row.ep-row-watched { border-left: 2px solid color-mix(in srgb, var(--accent) 50%, transparent); padding-left: calc(0.5rem - 2px); }
    .ep-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 6px;
      border: 1.5px solid var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.65rem;
      transition: background 0.1s, border-color 0.1s;
    }
    .ep-check:hover { border-color: var(--accent); }
    .ep-check.watched { background: var(--accent); border-color: var(--accent); color: #fff; }
    .ep-info { flex: 1; min-width: 0; cursor: pointer; }
    .ep-code { font-size: 0.7rem; color: var(--tx-dim); font-variant-numeric: tabular-nums; }
    .ep-title { font-size: 0.875rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .ep-air-date { font-size: 0.72rem; color: var(--tx-dim); flex-shrink: 0; }
    .ep-watched-at { font-size: 0.72rem; color: var(--accent); flex-shrink: 0; }
    .ep-watch-count { font-size: 0.72rem; color: var(--tx-dim); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .ep-edit-btn {
      flex-shrink: 0; height: 26px; padding: 0 0.4rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--tx-dim); font-size: 0.72rem;
      opacity: 0; transition: opacity 0.1s, background 0.1s;
      white-space: nowrap;
    }
    .episode-row:hover .ep-edit-btn { opacity: 1; }
    .ep-edit-btn:hover { background: var(--surface-2); color: var(--tx); }

    /* ── Episode detail ─────────────────────────────────────────────────── */
    .ep-hero { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 1.75rem; }
    .ep-still-thumb {
      width: 240px; flex-shrink: 0; border-radius: 8px;
      aspect-ratio: 16/9; object-fit: cover; background: var(--surface-2);
    }
    .ep-still-placeholder {
      width: 240px; flex-shrink: 0; aspect-ratio: 16/9; border-radius: 8px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 0.75rem;
    }
    .ep-info { flex: 1; min-width: 0; }
    .ep-title-main { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; line-height: 1.3; }
    .ep-meta-row { color: var(--tx-dim); font-size: 0.82rem; margin-bottom: 0.75rem; }
    .ep-watch-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 1rem;
    }
    /* ── Episode prev/next nav ───────────────────────────────────────────── */
    .ep-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; gap: 0.5rem; }
    .ep-nav-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.65rem; border-radius: 6px; font-size: 0.78rem;
      color: var(--tx-dim); border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; transition: background 0.1s, color 0.1s;
      white-space: nowrap; max-width: 48%; overflow: hidden; text-overflow: ellipsis;
      text-decoration: none;
    }
    .ep-nav-btn:hover { background: var(--surface-2); color: var(--tx); }
    .ep-nav-next { margin-left: auto; }
    .ep-nav-disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    /* ── Watch history toggle ────────────────────────────────────────────── */
    .wh-toggle-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.25rem 0.625rem; border-radius: 6px; font-size: 0.78rem;
      color: var(--tx-dim); background: var(--surface-2); border: 1px solid var(--border);
      cursor: pointer; margin-bottom: 1rem; transition: background 0.1s, color 0.1s;
    }
    .wh-toggle-btn:hover { background: var(--border); color: var(--tx); }

    /* ── Add banner ─────────────────────────────────────────────────────── */
    .add-banner {
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      border: 1.5px solid var(--accent);
      border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .add-banner h3 { color: var(--accent); margin-bottom: 0.25rem; }
    .add-banner p { font-size: 0.85rem; color: var(--tx-dim); }
    .add-status-row { display: flex; gap: 0.375rem; flex-wrap: wrap; margin: 0.75rem 0; }
    .add-status-opt {
      padding: 0.25rem 0.7rem;
      border-radius: 8px; border: 1px solid var(--border);
      font-size: 0.78rem; color: var(--tx-dim); cursor: pointer;
      transition: all 0.1s;
    }
    .add-status-opt:hover { border-color: var(--accent); color: var(--accent); }
    .add-status-opt.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }

    /* ── Search ─────────────────────────────────────────────────────────── */
    .search-input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--tx); font-size: 1rem; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-results { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.25rem; }
    .search-result {
      display: flex; gap: 0.875rem; align-items: center;
      padding: 0.75rem; background: var(--surface); border-radius: 10px;
      cursor: pointer; transition: background 0.1s;
    }
    .search-result:hover { background: var(--surface-2); }
    .search-result-poster {
      width: 42px; height: 63px;
      object-fit: cover; border-radius: 4px;
      background: var(--surface-2); flex-shrink: 0;
    }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-title { font-weight: 500; }
    .search-result-meta { font-size: 0.78rem; color: var(--tx-dim); }
    .search-result-overview {
      font-size: 0.75rem; color: var(--tx-dim);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .search-tracked { background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 0.68rem; flex-shrink: 0; }

    /* ── Person page ────────────────────────────────────────────────────── */
    .person-hero { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 2rem; }
    .person-photo {
      width: 110px; height: 110px; flex-shrink: 0;
      object-fit: cover; border-radius: 18%;
      background: var(--surface-2);
    }
    .person-photo-placeholder {
      width: 110px; height: 110px; flex-shrink: 0;
      border-radius: 18%; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 2rem;
    }
    .person-name { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.25rem; }
    .seen-in-section {
      background: color-mix(in srgb, var(--purple) 8%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--purple) 35%, var(--border));
      border-radius: 10px; padding: 1.25rem 1.25rem 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--purple) 15%, transparent) inset;
    }
    .seen-in-label {
      color: var(--purple); font-weight: 700;
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 0.875rem;
      padding-left: 0.625rem;
      border-left: 3px solid var(--purple);
    }
    .seen-in-grid {
      display: flex; gap: 0.875rem;
      overflow-x: auto; padding-bottom: 0.25rem;
    }
    .seen-in-card { flex-shrink: 0; width: 88px; cursor: pointer; }
    .seen-in-card img {
      width: 88px; height: 132px;
      object-fit: cover; border-radius: 6px;
      background: var(--surface-2);
    }
    .seen-in-card-placeholder {
      width: 88px; height: 132px;
      background: var(--surface-2); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-dim); font-size: 0.65rem; text-align: center; padding: 4px;
    }
    .seen-in-title { font-size: 0.7rem; color: var(--tx); margin-top: 0.35rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .seen-in-char { font-size: 0.65rem; color: var(--tx-dim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .seen-in-year { font-size: 0.62rem; color: var(--tx-dim); font-family: 'Geist Mono', monospace; }
    .guest-row {
      display: flex; align-items: center; gap: 0.875rem;
      padding: 0.5rem 0.25rem;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      cursor: pointer; transition: background 0.08s; border-radius: 6px;
    }
    .guest-row:hover { background: var(--surface); }
    .guest-info { flex: 1; min-width: 0; }
    .guest-show-title { font-size: 0.875rem; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .guest-detail { font-size: 0.72rem; color: var(--tx-dim); }
    .credits-list { display: flex; flex-direction: column; gap: 0.375rem; }
    .credit-row {
      display: flex; align-items: center; gap: 0.875rem;
      padding: 0.625rem; background: var(--surface); border-radius: 8px;
      cursor: pointer; transition: background 0.1s;
    }
    .credit-row:hover { background: var(--surface-2); }
    .credit-poster {
      width: 34px; height: 51px;
      object-fit: cover; border-radius: 4px;
      background: var(--surface-2); flex-shrink: 0;
    }
    .credit-poster-ph {
      width: 34px; height: 51px;
      background: var(--surface-2); border-radius: 4px; flex-shrink: 0;
    }
    .credit-info { flex: 1; min-width: 0; }
    .credit-title { font-size: 0.875rem; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .credit-char { font-size: 0.72rem; color: var(--tx-dim); }
    .credit-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }

    /* ── Date picker popover ────────────────────────────────────────────── */
    .popover-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .popover {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem;
      min-width: 250px; max-width: 320px; width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .popover h3 { font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--tx); }
    .wh-entry { display: flex; align-items: center; justify-content: space-between; padding: 0.3rem 0; font-size: 0.875rem; border-bottom: 1px solid var(--border); }
    .wh-entry:last-child { border-bottom: none; }
    .popover-opts { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem; }
    .popover-opt {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.625rem; border-radius: 8px; cursor: pointer;
      font-size: 0.875rem;
    }
    .popover-opt:hover { background: var(--surface-2); }
    .popover-opt input[type="radio"] { accent-color: var(--accent); }
    .date-input-wrap { margin-top: 0.25rem; padding-left: 1.75rem; display: none; }
    .date-input-wrap.show { display: block; }
    .date-input {
      width: 100%; padding: 0.35rem 0.5rem;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--tx); font-size: 0.85rem; outline: none;
    }
    .date-input:focus { border-color: var(--accent); }
    .popover-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    /* ── Empty & loading states ─────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--tx-dim); }
    .empty-state h3 { color: var(--tx); font-size: 1.1rem; margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 2.5rem 1rem; color: var(--tx-dim); font-size: 0.9rem; }

    /* ── Season bulk actions ────────────────────────────────────────────── */
    .bulk-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #bottom-nav { display: flex; }
      .desktop-only { display: none !important; }
      #app { padding-bottom: 72px; }
      .page { padding: 1rem; }
      .show-hero { gap: 1rem; }
      .show-poster { width: 80px; }
      .show-title { font-size: 1.2rem; }
      .person-hero { gap: 1rem; }
      .person-photo, .person-photo-placeholder { width: 80px; height: 80px; }
      .person-name { font-size: 1.2rem; }
      .poster-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; }
      .nav-logo { font-size: 0.95rem; }
      .ep-hero { gap: 1rem; flex-direction: column; }
      .ep-still-thumb, .ep-still-placeholder { width: 100%; }
      .ep-nav-btn { font-size: 0.72rem; padding: 0.25rem 0.5rem; }
    }
    @media (min-width: 641px) {
      .mobile-only { display: none !important; }
    }
  </style>
</head>
<body>
  <nav id="top-nav"></nav>
  <div id="app"></div>
  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const IMG = 'https://image.tmdb.org/t/p';
    const ACCENT = {
      schedule: 'var(--orange)',
      library:  'var(--yellow)',
      show:     'var(--blue)',
      movie:    'var(--blue)',
      season:   'var(--cyan)',
      episode:  'var(--green)',
      person:   'var(--purple)',
      add:      'var(--red)',
      settings: 'var(--red)',
    };
    const STATUS_LABEL = { airing: 'Airing', watching: 'Watching', hiatus: 'On Hiatus', finished: 'Finished', watchlist: 'Watchlist', abandoned: 'Abandoned' };
    const STATUS_COLOR = { airing: 'var(--orange)', watching: 'var(--yellow)', hiatus: 'var(--purple)', finished: 'var(--cyan)', watchlist: 'var(--blue)', abandoned: 'var(--muted)' };

    // ── Router ───────────────────────────────────────────────────────────────
    function navigate(path) { history.pushState({}, '', path); render(); }
    window.addEventListener('popstate', render);

    function parseRoute(path) {
      const p = path.split('/').filter(Boolean);
      if (!p.length) return { page: 'schedule' };
      if (p[0] === 'library')  return { page: 'library' };
      if (p[0] === 'add')      return { page: 'add' };
      if (p[0] === 'settings') return { page: 'settings' };
      if (p[0] === 'person')   return { page: 'person', personId: p[1] };
      if (p[0] === 'movie')    return { page: 'movie', movieId: p[1] };
      if (p[0] === 'show') {
        if (!p[1]) return { page: 'library' };
        if (p[2] === 'season' && p[4] === 'episode')
          return { page: 'episode', showId: p[1], season: +p[3], episode: +p[5] };
        if (p[2] === 'season')
          return { page: 'season', showId: p[1], season: +p[3] };
        return { page: 'show', showId: p[1] };
      }
      return { page: 'schedule' };
    }

    function setAccent(v) { document.documentElement.style.setProperty('--accent', v); }

    function render() {
      const r = parseRoute(location.pathname);
      buildNav(r.page);
      const app = document.getElementById('app');
      app.innerHTML = '<div class="loading">Loading…</div>';
      setAccent(ACCENT[r.page] || 'var(--red)');
      switch (r.page) {
        case 'schedule': pageSchedule(app); break;
        case 'library':  pageLibrary(app); break;
        case 'add':      pageAdd(app); break;
        case 'show':     pageShow(app, +r.showId); break;
        case 'season':   pageSeason(app, +r.showId, r.season); break;
        case 'episode':  pageEpisode(app, +r.showId, r.season, r.episode); break;
        case 'movie':    pageMovie(app, +r.movieId); break;
        case 'person':   pagePerson(app, +r.personId); break;
        case 'settings': pageSettings(app); break;
      }
    }

    // ── API ──────────────────────────────────────────────────────────────────
    async function api(method, path, body) {
      const r = await fetch(path, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t || r.statusText); }
      return r.json();
    }
    const get   = p       => api('GET', p);
    const post  = (p, b)  => api('POST', p, b);
    const patch = (p, b)  => api('PATCH', p, b);
    const del   = p       => api('DELETE', p);

    // ── Helpers ──────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function img(path, size) { return path ? `${IMG}/${size}${path}` : ''; }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function epCode(s, e) { return `S${pad2(s)}E${pad2(e)}`; }
    // imdbUrl: full URL string, or pass (imdbId, imdbType) to auto-build it
    function wikiSeasonUrl(w, seasonNum) {
      return w.season_url_template
        ? w.season_url_template.replace('{season}', seasonNum)
        : w.url;
    }
    function extLinksHTML(title, imdbId, imdbType, imdbUrl) {
      const enc = encodeURIComponent(title);
      const href = imdbUrl || (imdbId ? `https://www.imdb.com/${imdbType}/${imdbId}/` : null);
      const links = [];
      if (href) links.push(`<a class="ext-link" href="${href}" target="_blank" rel="noopener">↗ IMDb</a>`);
      links.push(`<a class="ext-link" href="https://en.wikipedia.org/wiki/Special:Search?search=${enc}" target="_blank" rel="noopener">↗ Wikipedia</a>`);
      links.push(`<a class="ext-link" href="https://www.rottentomatoes.com/search?search=${enc}" target="_blank" rel="noopener">↗ Rotten Tomatoes</a>`);
      return `<div class="ext-links">${links.join('')}</div>`;
    }
    function today() { return new Date().toISOString().slice(0, 10); }
    function yesterday() { return new Date(Date.now() - 86400000).toISOString().slice(0, 10); }

    // episodes: [{number: int, watched: bool}, ...]
    // Renders a flush segmented bar; container clips to border-radius.
    function segBarHTML(episodes) {
      if (!episodes.length) return '<div class="seg-bar"></div>';
      return '<div class="seg-bar">'
        + episodes.map(function(e) {
            return '<div class="seg' + (e.watched ? ' w' : '') + '" data-seg="' + e.number + '"></div>';
          }).join('')
        + '</div>';
    }

    // Attach click listeners to all [data-nav] elements within a root
    function bindNav(root) {
      (root || document).querySelectorAll('[data-nav]').forEach(el => {
        el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.nav); });
      });
    }

    // ── Nav ──────────────────────────────────────────────────────────────────
    function buildNav(page) {
      const top = document.getElementById('top-nav');
      const bot = document.getElementById('bottom-nav');
      top.innerHTML = `
        <div class="nav-bar">
          <a class="nav-logo" data-nav="/">WHIST</a>
          <div class="nav-links desktop-only">
            <a class="nav-link ${page==='schedule'?'active':''}" data-nav="/">Schedule</a>
            <a class="nav-link ${page==='library'?'active':''}" data-nav="/library">Library</a>
          </div>
          <div class="nav-spacer"></div>
          <a class="nav-icon" data-nav="/add" title="Add Show or Movie" style="font-size:1.3rem">+</a>
          <a class="nav-icon desktop-only" data-nav="/settings" title="Settings">⚙</a>
        </div>`;
      bot.innerHTML = `
        <a class="bottom-nav-item ${page==='schedule'?'active':''}" data-nav="/">
          <span class="bn-icon">📅</span><span>Schedule</span>
        </a>
        <a class="bottom-nav-item ${page==='library'?'active':''}" data-nav="/library">
          <span class="bn-icon">🎬</span><span>Library</span>
        </a>
        <a class="bottom-nav-item ${page==='add'?'active':''}" data-nav="/add">
          <span class="bn-icon">+</span><span>Add</span>
        </a>
        <a class="bottom-nav-item ${page==='settings'?'active':''}" data-nav="/settings">
          <span class="bn-icon">⚙</span><span>Settings</span>
        </a>`;
      bindNav(top); bindNav(bot);
    }

    // ── Cast grid component ──────────────────────────────────────────────────
    function castGridHTML(cast, label) {
      if (!cast.length) return `<p style="color:var(--tx-dim);font-size:0.85rem">No cast data.</p>`;
      return `
        <div class="cast-section">
          ${label ? `<div class="cast-section-label">${esc(label)}</div>` : ''}
          <div class="cast-grid">
            ${cast.slice(0, 40).map(m => `
              <div class="cast-item" data-nav="/person/${m.person_tmdb_id}">
                <div class="cast-photo-wrap">
                  ${m.profile_path
                    ? `<img class="cast-photo" src="${img(m.profile_path,'w185')}" alt="${esc(m.name)}" loading="lazy">`
                    : `<div class="cast-photo-placeholder">👤</div>`}
                  ${(m.seen_in_count > 0) ? `<div class="cast-badge">${m.seen_in_count}</div>` : ''}
                </div>
                <div class="cast-name">${esc(m.name)}</div>
                <div class="cast-char">${esc(m.character||'')}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    // ── Watch providers component ────────────────────────────────────────────

    // Normalize brand symbols so "Paramount+" and "Paramount Plus" compare equal.
    function _normProv(name) {
      return name
        .replace('Paramount+', 'Paramount Plus')
        .replace('Disney+', 'Disney Plus')
        .replace('Apple TV+', 'Apple TV Plus')
        .toLowerCase();
    }

    // True if providerName matches a saved service (exact or prefix match after normalizing).
    // e.g. savedSet has "Paramount+" → matches "Paramount Plus Amazon Channel" too.
    function isPreferred(providerName, savedSet) {
      const n = _normProv(providerName);
      for (const s of savedSet) {
        const sn = _normProv(s);
        if (n === sn || n.startsWith(sn + ' ') || sn.startsWith(n + ' ')) return true;
      }
      return false;
    }

    function providerLogoHTML(p, savedSet) {
      const pref = isPreferred(p.provider_name, savedSet);
      return '<div class="provider-logo' + (pref ? ' provider-pref' : '') + '" title="' + esc(p.provider_name) + '">'
        + (p.logo_path
            ? '<img src="' + img(p.logo_path, 'w92') + '" alt="' + esc(p.provider_name) + '" loading="lazy">'
            : '<span>' + esc(p.provider_name.slice(0, 2)) + '</span>')
        + '</div>';
    }

    // Build one provider group (Stream or Rent).
    // If the user has preferences and some match: show preferred + "+N others" toggle.
    // Otherwise show all.
    function _providerGroupHTML(providers, label, savedSet) {
      if (!providers.length) return '';
      const pref  = providers.filter(p =>  isPreferred(p.provider_name, savedSet));
      const other = providers.filter(p => !isPreferred(p.provider_name, savedSet));
      const collapse = savedSet.size > 0 && pref.length > 0 && other.length > 0;

      let logos;
      if (collapse) {
        logos = pref.map(p => providerLogoHTML(p, savedSet)).join('');
        logos += '<button class="provider-toggle"'
          + " onclick=\"this.nextElementSibling.classList.add('open');this.hidden=true\""
          + '>+' + other.length + '</button>';
        logos += '<span class="provider-overflow">'
          + other.map(p => providerLogoHTML(p, savedSet)).join('')
          + '</span>';
      } else {
        logos = providers.map(p => providerLogoHTML(p, savedSet)).join('');
      }

      return '<div class="provider-group">'
        + '<span class="provider-label">' + label + '</span>'
        + '<div class="provider-logos">' + logos + '</div>'
        + '</div>';
    }

    function providerRowHTML(streaming, rent, savedSet) {
      if (!streaming.length && !rent.length) return '';
      return '<div class="provider-row">'
        + _providerGroupHTML(streaming, 'Stream', savedSet)
        + _providerGroupHTML(rent, 'Rent', savedSet)
        + '</div>';
    }

    // Shared helper: fetch and inject providers (non-blocking).
    // selector: CSS selector for the target element within app.
    // streamOnly: true = streaming logos only (compact), false = Stream + Rent groups.
    function loadProviders(app, tmdbId, selector, streamOnly) {
      const saved = JSON.parse(localStorage.getItem('whist_services') || '[]');
      const savedSet = new Set(saved);
      const sort = arr => [
        ...arr.filter(p =>  isPreferred(p.provider_name, savedSet)),
        ...arr.filter(p => !isPreferred(p.provider_name, savedSet)),
      ];
      get(`/shows/${tmdbId}/watch-providers`).then(prov => {
        const el = app.querySelector(selector);
        if (!el) return;
        if (streamOnly) {
          el.innerHTML = sort(prov.streaming).map(p => providerLogoHTML(p, savedSet)).join('');
        } else {
          el.innerHTML = providerRowHTML(sort(prov.streaming), sort(prov.rent), savedSet);
        }
      }).catch(() => {
        const el = app.querySelector(selector);
        if (el) el.remove();
      });
    }

    // ── Date picker ──────────────────────────────────────────────────────────
    function showDatePicker(titleStr, currentDate, onSave) {
      const tod = today(), yest = yesterday();
      let sel = 'today';
      if (!currentDate) sel = 'today';
      else if (currentDate === tod)  sel = 'today';
      else if (currentDate === yest) sel = 'yesterday';
      else sel = 'pick';

      const ov = document.createElement('div');
      ov.className = 'popover-overlay';
      ov.innerHTML = `
        <div class="popover">
          <h3>${esc(titleStr)}</h3>
          <div class="popover-opts">
            <label class="popover-opt">
              <input type="radio" name="dp" value="today" ${sel==='today'?'checked':''}> Today
            </label>
            <label class="popover-opt">
              <input type="radio" name="dp" value="yesterday" ${sel==='yesterday'?'checked':''}> Yesterday
            </label>
            <label class="popover-opt">
              <input type="radio" name="dp" value="pick" ${sel==='pick'?'checked':''}> Pick a date…
            </label>
            <div class="date-input-wrap ${sel==='pick'?'show':''}">
              <input class="date-input" type="date" value="${sel==='pick'&&currentDate?currentDate:''}">
            </div>
            <label class="popover-opt">
              <input type="radio" name="dp" value="none"> No date
            </label>
          </div>
          <div class="popover-actions">
            <button class="btn btn-ghost btn-sm" id="_dp_cancel">Cancel</button>
            <button class="btn btn-accent btn-sm" id="_dp_save">Save</button>
          </div>
        </div>`;

      ov.querySelectorAll('input[name="dp"]').forEach(r => {
        r.addEventListener('change', () => {
          ov.querySelector('.date-input-wrap').classList.toggle('show', r.value === 'pick');
        });
      });
      ov.querySelector('#_dp_cancel').onclick = () => ov.remove();
      ov.querySelector('#_dp_save').onclick = () => {
        const v = ov.querySelector('input[name="dp"]:checked')?.value || 'today';
        let d = v === 'today' ? tod : v === 'yesterday' ? yest
              : v === 'pick' ? (ov.querySelector('.date-input').value || null)
              : null;
        ov.remove();
        onSave(d);
      };
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.body.appendChild(ov);
    }

    function showWatchHistory(tmdbId, seasonNum, epNum, title, onChanged) {
      const ov = document.createElement('div');
      ov.className = 'popover-overlay';
      ov.innerHTML =
        '<div class="popover">' +
          '<h3>Watch History</h3>' +
          '<div class="wh-title" style="color:var(--tx-dim);font-size:0.85rem;margin-bottom:0.75rem">' + esc(title) + '</div>' +
          '<div id="_wh_list"><div class="loading">Loading\u2026</div></div>' +
          '<div class="popover-actions">' +
            '<button class="btn btn-outline btn-sm" id="_wh_add">+ Log Watch</button>' +
            '<button class="btn btn-ghost btn-sm" id="_wh_close">Close</button>' +
          '</div>' +
        '</div>';

      function renderList(entries) {
        const list = ov.querySelector('#_wh_list');
        if (!entries.length) {
          list.innerHTML = '<div style="color:var(--tx-dim);font-size:0.85rem;padding:0.5rem 0">No history yet.</div>';
          return;
        }
        let html = '';
        entries.forEach(function(e) {
          html += '<div class="wh-entry">' +
            '<span>' + (e.watched_at || 'date unknown') + '</span>' +
            '<button class="btn btn-ghost btn-sm wh-delete" data-id="' + e.id + '" title="Remove">\u2715</button>' +
            '</div>';
        });
        list.innerHTML = html;
        list.querySelectorAll('.wh-delete').forEach(function(btn) {
          btn.addEventListener('click', async function() {
            const id = +btn.dataset.id;
            const res = await del('/episodes/history/' + id);
            onChanged && onChanged(res);
            if (res.watch_count === 0) { ov.remove(); return; }
            const updated = await get('/shows/' + tmdbId + '/season/' + seasonNum + '/episode/' + epNum + '/watch-history');
            renderList(updated.entries);
          });
        });
      }

      get('/shows/' + tmdbId + '/season/' + seasonNum + '/episode/' + epNum + '/watch-history')
        .then(function(d) { renderList(d.entries); });

      ov.querySelector('#_wh_add').addEventListener('click', function() {
        showDatePicker(title, null, async function(d) {
          const res = await post('/episodes/watched', {
            tmdb_show_id: tmdbId, season_number: seasonNum,
            episode_number: epNum, watched: true, watched_at: d,
          });
          onChanged && onChanged(res);
          const updated = await get('/shows/' + tmdbId + '/season/' + seasonNum + '/episode/' + epNum + '/watch-history');
          renderList(updated.entries);
        });
      });
      ov.querySelector('#_wh_close').addEventListener('click', function() { ov.remove(); });
      ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
      document.body.appendChild(ov);
    }

    // ── Poster card ──────────────────────────────────────────────────────────
    function posterCardHTML(show) {
      const href = `/show/${show.tmdb_id}`;
      const pct  = show.total_count > 0 ? Math.round(show.watched_count / show.total_count * 100) : 0;
      const year = show.first_air_date ? show.first_air_date.slice(0, 4) : '';
      const epCount = show.total_count > 0 ? `${show.watched_count}/${show.total_count}` : '';
      return `
        <div class="poster-card" data-nav="${href}">
          ${show.poster_path
            ? `<img src="${img(show.poster_path,'w300')}" alt="${esc(show.title)}" loading="lazy">`
            : `<div class="poster-placeholder">${esc(show.title)}</div>`}
          <div class="card-title">${esc(show.title)}</div>
          <div class="card-meta"><span>${year}</span><span>${epCount}</span></div>
          <div class="card-progress" data-seg-card="${show.tmdb_id}">
            <div class="card-progress-fill" style="width:${pct}%"></div>
          </div>
        </div>`;
    }

    function movieCardHTML(movie) {
      const href = `/movie/${movie.tmdb_id}`;
      const year = movie.first_air_date ? movie.first_air_date.slice(0, 4) : '';
      const watchedLabel = movie.watched ? '✓' : '';
      return `
        <div class="poster-card" data-nav="${href}">
          ${movie.poster_path
            ? `<img src="${img(movie.poster_path,'w300')}" alt="${esc(movie.title)}" loading="lazy">`
            : `<div class="poster-placeholder">${esc(movie.title)}</div>`}
          <div class="card-title">${esc(movie.title)}</div>
          <div class="card-meta"><span>${year}</span><span style="color:var(--accent)">${watchedLabel}</span></div>
        </div>`;
    }

    // ── Page: Schedule ───────────────────────────────────────────────────────
    async function pageSchedule(app) {
      var data;
      try { data = await get('/schedule/today'); }
      catch(e) {
        app.innerHTML = '<div class="page"><div class="empty-state"><h3>Error loading schedule</h3><p>' + esc(e.message) + '</p></div></div>';
        return;
      }

      var dailyCap = parseInt(localStorage.getItem('whist_daily_cap') || '5', 10) || 5;

      function schedCardHTML(item) {
        var show = item.show, ep = item.next_episode;
        var available = item.available_count || 0, suggested = item.suggested_count || 0;
        var code = epCode(ep.season_number, ep.episode_number);
        var nav = '/show/' + show.tmdb_id + '/season/' + ep.season_number + '/episode/' + ep.episode_number;
        var availBadge = available > 1 ? '<span class="sched-available-badge">' + available + ' available</span>' : '';
        var paceBadge  = suggested > 0  ? '<span class="sched-pace-badge">1\u20132 eps</span>' : '';
        var poster = show.poster_path
          ? '<img class="sched-poster" src="' + img(show.poster_path, 'w185') + '" alt="' + esc(show.title) + '" loading="lazy">'
          : '<div class="sched-poster"></div>';
        var airDate = ep.air_date ? '<div class="sched-date">' + esc(ep.air_date) + '</div>' : '';
        return '<div class="schedule-card" data-nav="' + nav + '" data-show-id="' + show.tmdb_id + '">'
          + poster
          + '<div class="sched-info">'
            + '<div class="sched-title-row"><span class="sched-title">' + esc(show.title) + '</span>' + availBadge + paceBadge + '</div>'
            + '<div class="sched-ep"><span class="sched-ep-code">' + esc(code) + '</span>'
              + (ep.title ? '<span class="sched-ep-title">' + esc(ep.title) + '</span>' : '') + '</div>'
            + airDate
            + '<div class="sched-providers"></div>'
          + '</div>'
          + '</div>';
      }

      var items = data.items || [];
      var cardsHTML = '';
      var remaining = dailyCap;

      for (var i = 0; i < items.length; i++) {
        if (remaining <= 0) {
          cardsHTML += '<div class="schedule-cap-hit">You\'ve hit today\'s cap \u2014 enjoy what you have!</div>';
          break;
        }
        cardsHTML += schedCardHTML(items[i]);
        remaining -= 1;
      }

      var today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

      var capBar = '<div class="schedule-cap-bar">'
        + 'Daily cap'
        + '<div class="cap-stepper">'
          + '<button id="cap-dec">\u2212</button>'
          + '<span id="cap-val">' + dailyCap + '</span>'
          + '<button id="cap-inc">+</button>'
        + '</div>'
        + 'episodes'
        + '</div>';

      var body = items.length
        ? '<div class="schedule-list">' + cardsHTML + '</div>'
        : '<div class="empty-state"><h3>Nothing queued up</h3><p>Set shows to Airing or Watching to see suggestions here.</p>'
          + '<button class="btn btn-accent" style="margin-top:1rem" data-nav="/library">Go to Library</button></div>';

      app.innerHTML = '<div class="page">'
        + '<div class="page-header"><h1>Schedule</h1><p>' + today + '</p></div>'
        + capBar
        + body
        + '</div>';
      bindNav(app);

      function updateCap(delta) {
        var v = Math.max(1, Math.min(50, dailyCap + delta));
        if (v === dailyCap) return;
        dailyCap = v;
        localStorage.setItem('whist_daily_cap', String(v));
        pageSchedule(app);
      }
      app.querySelector('#cap-dec').addEventListener('click', function() { updateCap(-1); });
      app.querySelector('#cap-inc').addEventListener('click', function() { updateCap(1); });

      // Load preferred streaming providers for each unique show (non-blocking).
      var saved = JSON.parse(localStorage.getItem('whist_services') || '[]');
      var savedSet = new Set(saved);
      var uniqueShowIds = Array.from(new Set(items.map(function(item) { return item.show.tmdb_id; })));
      uniqueShowIds.forEach(function(showId) {
        get('/shows/' + showId + '/watch-providers').then(function(prov) {
          var streaming = savedSet.size > 0
            ? prov.streaming.filter(function(p) { return isPreferred(p.provider_name, savedSet); })
            : prov.streaming;
          if (!streaming.length) return;
          var html = streaming.map(function(p) { return providerLogoHTML(p, savedSet); }).join('');
          app.querySelectorAll('[data-show-id="' + showId + '"] .sched-providers').forEach(function(el) {
            el.innerHTML = html;
          });
        }).catch(function() {});
      });
    }

    // ── Page: Library ────────────────────────────────────────────────────────
    async function pageLibrary(app) {
      let shows, movies;
      try {
        [shows, movies] = await Promise.all([get('/shows'), get('/movies')]);
      } catch (e) {
        app.innerHTML = `<div class="page"><div class="empty-state"><h3>Error</h3><p>${esc(e.message)}</p></div></div>`;
        return;
      }

      const totalTracked = shows.length + movies.length;

      // Render outer shell once — controls persist across re-renders
      app.innerHTML = `
        <div class="page">
          <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
            <div>
              <h1>My Library</h1>
              <p id="lib-count">${totalTracked} title${totalTracked!==1?'s':''} tracked</p>
            </div>
            <button class="btn btn-accent" data-nav="/add">+ Add</button>
          </div>
          <div class="library-controls">
            <input type="search" id="lib-search" placeholder="Search library…" autocomplete="off">
            <select id="lib-sort">
              <option value="default">Last watched</option>
              <option value="alpha-asc">A → Z</option>
              <option value="alpha-desc">Z → A</option>
              <option value="progress-hi">Progress ↓</option>
              <option value="progress-lo">Progress ↑</option>
            </select>
          </div>
          <div id="lib-body"></div>
        </div>`;
      bindNav(app);

      const searchInput = app.querySelector('#lib-search');
      const sortSelect  = app.querySelector('#lib-sort');
      const bodyEl      = app.querySelector('#lib-body');
      const countEl     = app.querySelector('#lib-count');

      const segCache = {}; // tmdb_id -> segBarHTML string ('' if no episodes)
      const order = ['airing', 'watching', 'hiatus', 'finished', 'watchlist', 'abandoned'];
      const sectionColors = { airing: 'var(--orange)', watching: 'var(--yellow)', hiatus: 'var(--purple)', finished: 'var(--cyan)', watchlist: 'var(--blue)', abandoned: 'var(--muted)' };

      function renderGrid() {
        const q  = searchInput.value.toLowerCase().trim();
        const sv = sortSelect.value;

        // Filter by search query
        const filteredShows  = q ? shows.filter(function(s)  { return s.title.toLowerCase().includes(q); }) : shows;
        const filteredMovies = q ? movies.filter(function(m) { return m.title.toLowerCase().includes(q); }) : movies;

        // Sort shows
        const sortedShows = filteredShows.slice();
        if (sv === 'alpha-asc') {
          sortedShows.sort(function(a, b) { return a.title.localeCompare(b.title); });
        } else if (sv === 'alpha-desc') {
          sortedShows.sort(function(a, b) { return b.title.localeCompare(a.title); });
        } else if (sv === 'progress-hi') {
          sortedShows.sort(function(a, b) {
            const pa = a.total_count ? a.watched_count / a.total_count : 0;
            const pb = b.total_count ? b.watched_count / b.total_count : 0;
            return pb - pa;
          });
        } else if (sv === 'progress-lo') {
          sortedShows.sort(function(a, b) {
            const pa = a.total_count ? a.watched_count / a.total_count : 0;
            const pb = b.total_count ? b.watched_count / b.total_count : 0;
            return pa - pb;
          });
        }

        // Sort movies
        const sortedMovies = filteredMovies.slice();
        if (sv === 'alpha-asc') {
          sortedMovies.sort(function(a, b) { return a.title.localeCompare(b.title); });
        } else if (sv === 'alpha-desc') {
          sortedMovies.sort(function(a, b) { return b.title.localeCompare(a.title); });
        }

        // Group shows into status sections
        const groups = { airing: [], watching: [], hiatus: [], finished: [], watchlist: [], abandoned: [] };
        sortedShows.forEach(function(s) {
          (groups[s.user_status] ? groups[s.user_status] : groups.watching).push(s);
        });

        // Group movies into status sections
        const movieGroups = { finished: [], watchlist: [], abandoned: [] };
        sortedMovies.forEach(function(m) {
          (movieGroups[m.user_status] ? movieGroups[m.user_status] : movieGroups.watchlist).push(m);
        });

        // Render shows
        let html = '';
        if (sortedShows.length) {
          html += order.filter(function(k) { return groups[k].length; }).map(function(k) {
            return '<div class="section">'
              + '<div class="section-header">'
              + '<h2 style="color:' + sectionColors[k] + '">' + STATUS_LABEL[k] + '</h2>'
              + '<span class="section-count">' + groups[k].length + '</span>'
              + '</div>'
              + '<div class="poster-grid">' + groups[k].map(posterCardHTML).join('') + '</div>'
              + '</div>';
          }).join('');
        }

        // Render movies
        const movieOrder = ['finished', 'watchlist', 'abandoned'];
        const movieLabel = { finished: 'Watched', watchlist: 'Watchlist', abandoned: 'Abandoned' };
        if (sortedMovies.length) {
          html += movieOrder.filter(function(k) { return movieGroups[k].length; }).map(function(k) {
            return '<div class="section">'
              + '<div class="section-header">'
              + '<h2 style="color:' + sectionColors[k] + '">Movies · ' + movieLabel[k] + '</h2>'
              + '<span class="section-count">' + movieGroups[k].length + '</span>'
              + '</div>'
              + '<div class="poster-grid">' + movieGroups[k].map(movieCardHTML).join('') + '</div>'
              + '</div>';
          }).join('');
        }

        if (!html) {
          html = q
            ? '<div class="empty-state"><p>No titles matching \u201c' + esc(q) + '\u201d</p></div>'
            : '<div class="empty-state"><h3>Nothing tracked yet</h3><p>Add some shows or movies to get started.</p><button class="btn btn-accent" style="margin-top:1rem" data-nav="/add">+ Add</button></div>';
        }

        bodyEl.innerHTML = html;
        bindNav(bodyEl);

        // Update count label
        const total = shows.length + movies.length;
        const shown = sortedShows.length + sortedMovies.length;
        countEl.textContent = q
          ? (shown + ' of ' + total + ' title' + (total !== 1 ? 's' : ''))
          : (total + ' title' + (total !== 1 ? 's' : '') + ' tracked');

        // Inject segment bars from cache or fetch (shows only)
        sortedShows.forEach(function(show) {
          const el = bodyEl.querySelector('[data-seg-card="' + show.tmdb_id + '"]');
          if (!el) return;
          if (show.tmdb_id in segCache) {
            if (segCache[show.tmdb_id]) el.innerHTML = segCache[show.tmdb_id];
            return;
          }
          get('/shows/' + show.tmdb_id + '/season-progress').then(function(seasons) {
            const episodes = seasons.flatMap(function(s) { return s.episodes; })
                                    .map(function(e, i) { return { number: i, watched: e.watched }; });
            const barHTML = episodes.length ? segBarHTML(episodes) : '';
            segCache[show.tmdb_id] = barHTML;
            const el2 = bodyEl.querySelector('[data-seg-card="' + show.tmdb_id + '"]');
            if (el2 && barHTML) el2.innerHTML = barHTML;
          }).catch(function() { segCache[show.tmdb_id] = ''; });
        });
      }

      // Debounced search
      let searchTimer;
      searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderGrid, 150);
      });
      sortSelect.addEventListener('change', renderGrid);

      renderGrid(); // initial render
    }

    // ── Page: Add Show/Movie ─────────────────────────────────────────────────
    async function pageAdd(app) {
      app.innerHTML = `
        <div class="page">
          <div class="page-header">
            <h1>Add</h1>
            <p>Search TMDB to track a show or movie</p>
          </div>
          <div style="display:flex;gap:0.375rem;margin-bottom:1rem">
            <button class="status-btn active" id="type-tv">TV Shows</button>
            <button class="status-btn" id="type-movie">Movies</button>
          </div>
          <input class="search-input" id="q" type="search" placeholder="Search…" autocomplete="off">
          <div id="results"></div>
        </div>`;

      const input = app.querySelector('#q');
      const results = app.querySelector('#results');
      const btnTV = app.querySelector('#type-tv');
      const btnMovie = app.querySelector('#type-movie');
      let debounce, trackedIds = new Set();
      let mediaType = 'tv';

      Promise.all([get('/shows'), get('/movies')]).then(([s, m]) => {
        trackedIds = new Set([...s.map(x => x.tmdb_id), ...m.map(x => x.tmdb_id)]);
      }).catch(() => {});

      function setType(t) {
        mediaType = t;
        btnTV.classList.toggle('active', t === 'tv');
        btnMovie.classList.toggle('active', t === 'movie');
        results.innerHTML = '';
        input.value = '';
        input.focus();
      }

      btnTV.addEventListener('click', () => setType('tv'));
      btnMovie.addEventListener('click', () => setType('movie'));

      input.focus();
      input.addEventListener('input', () => {
        clearTimeout(debounce);
        const q = input.value.trim();
        if (!q) { results.innerHTML = ''; return; }
        debounce = setTimeout(async () => {
          results.innerHTML = '<div class="loading">Searching…</div>';
          try {
            let res;
            if (mediaType === 'movie') {
              res = await get('/movies/search?q=' + encodeURIComponent(q));
              res = res.map(r => ({ ...r, first_air_date: r.release_date, _nav: `/movie/${r.tmdb_id}` }));
            } else {
              res = await post('/shows/search', { query: q });
              res = res.map(r => ({ ...r, _nav: `/show/${r.tmdb_id}` }));
            }
            if (!res.length) { results.innerHTML = '<div class="empty-state"><p>No results.</p></div>'; return; }
            results.innerHTML = `<div class="search-results">${res.map(r => `
              <div class="search-result" data-nav="${r._nav}">
                ${r.poster_path
                  ? `<img class="search-result-poster" src="${img(r.poster_path,'w92')}" alt="${esc(r.title)}">`
                  : `<div class="search-result-poster"></div>`}
                <div class="search-result-info">
                  <div class="search-result-title">${esc(r.title)}</div>
                  <div class="search-result-meta">${r.first_air_date?r.first_air_date.slice(0,4):''}</div>
                  <div class="search-result-overview">${esc(r.overview)}</div>
                </div>
                ${trackedIds?.has(r.tmdb_id) ? '<span class="search-tracked">✓ Added</span>' : ''}
              </div>`).join('')}</div>`;
            bindNav(results);
          } catch(e) {
            results.innerHTML = `<div class="empty-state"><p>Search error: ${esc(e.message)}</p></div>`;
          }
        }, 300);
      });
      bindNav(app);
    }

    // ── Page: Show ───────────────────────────────────────────────────────────
    async function pageShow(app, tmdbId) {
      let [detailR, progressR] = await Promise.allSettled([
        get(`/shows/${tmdbId}/detail`),
        get(`/shows/${tmdbId}/progress`),
      ]);
      const detail = detailR.status === 'fulfilled' ? detailR.value : null;
      const progress = progressR.status === 'fulfilled' ? progressR.value : null;

      if (!detail) {
        app.innerHTML = `<div class="page"><div class="empty-state"><h3>Show not found</h3></div></div>`;
        return;
      }

      const years = detail.first_air_date
        ? (detail.last_air_date && detail.last_air_date !== detail.first_air_date
            ? `${detail.first_air_date}–${detail.last_air_date}` : detail.first_air_date)
        : '';

      const networks = detail.networks.slice(0,2).join(', ');
      const meta = [years, networks, detail.tmdb_status].filter(Boolean).join(' · ');

      const addBannerHTML = !detail.tracked ? `
        <div class="add-banner" id="add-banner">
          <h3>Add to Library</h3>
          <p>Choose a status to start tracking</p>
          <div class="add-status-row">
            ${Object.entries(STATUS_LABEL).filter(([k]) => k !== 'hiatus').map(([k,v]) =>
              `<button class="add-status-opt ${k==='airing'?'selected':''}" data-status="${k}">${v}</button>`
            ).join('')}
          </div>
          <button class="btn btn-accent" id="add-btn" style="margin-top:0.5rem">Add to Library</button>
        </div>` : '';

      const currentPace = detail.watch_pace || 'binge';
      const PACE_LABEL = { binge: 'Binge', fast: 'Fast', weekly: 'Weekly' };
      const showPaceSelector = detail.tracked && (detail.user_status === 'watching' || detail.user_status === 'airing');
      const paceHTML = showPaceSelector
        ? '<div class="pace-selector"><span class="pace-label">Pace</span>'
          + Object.entries(PACE_LABEL).map(function(e) {
              return '<button class="pace-btn ' + (currentPace === e[0] ? 'active' : '') + '" data-pace="' + e[0] + '">' + e[1] + '</button>';
            }).join('')
          + '</div>'
        : '';

      const statusHTML = detail.tracked ? `
        <div class="status-selector">
          ${Object.entries(STATUS_LABEL).map(([k,v]) =>
            `<button class="status-btn ${detail.user_status===k?'active':''}" data-status="${k}">${v}</button>`
          ).join('')}
        </div>` + paceHTML : '';

      const progressHTML = progress ? `
        <div class="progress-row">${progress.watched} / ${progress.total} episodes (${progress.percent}%)</div>
        <div class="progress-bar" style="max-width:240px"><div class="progress-fill" style="width:${progress.percent}%"></div></div>` : '';

      const seasonsHTML = detail.seasons.map(s => `
        <div class="season-row" data-nav="/show/${tmdbId}/season/${s.season_number}">
          ${s.poster_path
            ? `<img class="season-thumb" src="${img(s.poster_path,'w185')}" alt="" loading="lazy">`
            : `<div class="season-thumb-placeholder">${s.season_number}</div>`}
          <div class="season-info">
            <div class="season-name">${esc(s.name||`Season ${s.season_number}`)}</div>
            <div class="season-meta">${s.air_date?s.air_date+' · ':''}${s.episode_count} ep</div>
            <div class="season-bar-wrap" data-season="${s.season_number}"></div>
          </div>
          <span class="season-chevron">›</span>
        </div>`).join('');

      app.innerHTML = `
        <div class="page">
          <div class="breadcrumb">
            <a data-nav="/library">Library</a>
          </div>
          ${addBannerHTML}
          <div class="show-hero">
            ${detail.poster_path
              ? `<img class="show-poster" src="${img(detail.poster_path,'w300')}" alt="${esc(detail.title)}">`
              : ''}
            <div class="show-info">
              <h1 class="show-title">${esc(detail.title)}</h1>
              <div class="show-meta">${esc(meta)}</div>
              <a href="https://www.themoviedb.org/tv/${tmdbId}" target="_blank" rel="noopener" style="font-size:0.78rem;color:var(--tx-dim);text-decoration:none;display:inline-block;margin-bottom:0.375rem">↗ TMDB</a>
              <div class="ext-links" id="wiki-pills">
                ${(detail.wikis||[]).map(w => `<span class="wiki-pill"><a class="ext-link" href="${esc(w.url)}" target="_blank" rel="noopener">↗ ${esc(w.label)}</a><button class="wiki-del" data-wiki-id="${w.id}" title="Remove">×</button></span>`).join('')}
              </div>
              ${extLinksHTML(detail.title, detail.imdb_id, 'title')}
              <div id="wiki-add-area" style="margin-top:0.25rem">
                <button class="ext-link" id="wiki-add-btn" style="cursor:pointer;border-style:dashed">+ Add wiki</button>
                <div id="wiki-form" style="display:none;margin-top:0.4rem;gap:0.4rem;align-items:center;flex-wrap:wrap">
                  <input id="wiki-label" placeholder="Label (e.g. Memory Alpha)" style="font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--tx);width:160px">
                  <input id="wiki-url" placeholder="Show URL (https://...)" style="font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--tx);width:220px">
                  <input id="wiki-season-tmpl" placeholder="Season URL with {season} (optional)" style="font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--tx);width:260px">
                  <button class="ext-link" id="wiki-save" style="cursor:pointer">Save</button>
                  <button class="ext-link" id="wiki-cancel" style="cursor:pointer">Cancel</button>
                </div>
              </div>
              ${statusHTML}
              ${progressHTML}
              <div id="watch-providers"></div>
              ${detail.overview
                ? `<p class="show-overview${detail.overview.length > 280 ? ' show-overview-clamped' : ''}" id="show-overview">${esc(detail.overview)}</p>
                   ${detail.overview.length > 280 ? `<span class="show-more-btn" id="show-more">Show more ▾</span>` : ''}`
                : ''}
            </div>
          </div>
          <div class="section" style="margin-top:1.75rem">
            <div class="section-header"><h2 style="color:var(--accent)">Cast</h2></div>
            <div id="cast-pane"><div class="loading" style="padding:0.5rem 0;text-align:left;font-size:0.85rem">Loading cast…</div></div>
          </div>
          <div class="section">
            <div class="section-header"><h2 style="color:var(--accent)">Seasons</h2></div>
            <div class="season-list">${seasonsHTML}</div>
          </div>
        </div>`;

      bindNav(app);

      // Overview expand
      app.querySelector('#show-more')?.addEventListener('click', function() {
        app.querySelector('#show-overview')?.classList.remove('show-overview-clamped');
        this.remove();
      });

      // Load season progress bars (non-blocking)
      get(`/shows/${tmdbId}/season-progress`).then(function(seasons) {
        seasons.forEach(function(s) {
          const wrap = app.querySelector('.season-bar-wrap[data-season="' + s.season_number + '"]');
          if (wrap) wrap.outerHTML = segBarHTML(s.episodes);
        });
      }).catch(function() {});

      // Load cast (non-blocking)
      get(`/shows/${tmdbId}/cast`).then(cast => {
        const pane = app.querySelector('#cast-pane');
        if (!pane) return;
        pane.innerHTML = castGridHTML(cast);
        bindNav(pane);
      }).catch(() => {
        const pane = app.querySelector('#cast-pane');
        if (pane) pane.innerHTML = '';
      });

      // Status buttons
      app.querySelectorAll('.status-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await patch(`/shows/${tmdbId}/status`, { user_status: btn.dataset.status });
            app.querySelectorAll('.status-btn').forEach(b =>
              b.classList.toggle('active', b.dataset.status === btn.dataset.status));
          } catch(e) { alert('Error: ' + e.message); }
        });
      });

      // Pace buttons
      app.querySelectorAll('.pace-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          try {
            await patch('/shows/' + tmdbId + '/pace', { watch_pace: btn.dataset.pace });
            app.querySelectorAll('.pace-btn').forEach(function(b) {
              b.classList.toggle('active', b.dataset.pace === btn.dataset.pace);
            });
          } catch(e) { alert('Error: ' + e.message); }
        });
      });

      // Custom wiki links
      app.querySelectorAll('.wiki-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await del(`/shows/${tmdbId}/wikis/${btn.dataset.wikiId}`);
            btn.closest('.wiki-pill').remove();
          } catch(e) { alert('Error: ' + e.message); }
        });
      });
      const wikiForm = app.querySelector('#wiki-form');
      app.querySelector('#wiki-add-btn').addEventListener('click', () => {
        wikiForm.style.display = wikiForm.style.display === 'none' ? 'flex' : 'none';
      });
      app.querySelector('#wiki-cancel').addEventListener('click', () => {
        wikiForm.style.display = 'none';
      });
      app.querySelector('#wiki-save').addEventListener('click', async () => {
        const label = app.querySelector('#wiki-label').value.trim();
        const url   = app.querySelector('#wiki-url').value.trim();
        const tmpl  = app.querySelector('#wiki-season-tmpl').value.trim() || null;
        if (!label || !url) return;
        try {
